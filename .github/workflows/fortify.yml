name: iOS-ipa-build

env:
  EXPO_USE_PRECOMPILED_MODULES: 0

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-15
    steps:
      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          sudo xcodebuild -runFirstLaunch


      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: 'npm'

      - name: Strip expo-dev-client for Release build
        run: |
          node -e '
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          if (pkg.dependencies && pkg.dependencies["expo-dev-client"]) {
            delete pkg.dependencies["expo-dev-client"];
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            console.log("Successfully removed expo-dev-client dependency");
          }
          '

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS App via EAS
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN is missing. Please set it in GitHub Secrets to build."
            echo "Alternatively, read DISTRIBUTION_GUIDE.md to build locally."
            exit 0
          fi
          eas build --platform ios --profile preview --non-interactive
