name: iOS-ipa-build

env:
  EXPO_USE_PRECOMPILED_MODULES: 0

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Patch Swift Packages in node_modules
        run: python3 patch_packages.py

      - name: Generate iOS project (without install)
        run: npx expo prebuild --platform ios --no-install

      - name: Patch iOS Xcode Project and lock SPM dependencies
        run: python3 patch_ios_project.py

      - name: Patch Podfile to disable code signing
        run: |
          ruby -e '
          podfile = File.read("ios/Podfile")
          if podfile.include?("post_install do |installer|")
            code_signing_logic = "  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"\n      config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"\n      config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"\n      config.build_settings[\"SDKROOT\"] = \"iphoneos\"\n    end\n  end\n  installer.aggregate_targets.each do |target|\n    target.user_project.targets.each do |proj_target|\n      proj_target.build_configurations.each do |config|\n        config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"\n        config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"\n        config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"\n        config.build_settings[\"SDKROOT\"] = \"iphoneos\"\n      end\n    end\n    target.user_project.save\n  end"
            podfile = podfile.sub("post_install do |installer|", "post_install do |installer|\n#{code_signing_logic}")
            File.write("ios/Podfile", podfile)
            puts "Successfully patched Podfile"
          else
            puts "Could not find post_install in Podfile"
            exit 1
          end
          '

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Unsigned)
        run: |
          if ! xcodebuild -workspace ios/ChessTimeIOS.xcworkspace \
                         -scheme ChessTimeIOS \
                         -configuration Release \
                         -sdk iphoneos \
                         -derivedDataPath build \
                         CODE_SIGNING_ALLOWED=NO \
                         CODE_SIGNING_REQUIRED=NO \
                         CODE_SIGN_IDENTITY="" \
                         PROVISIONING_PROFILE_REQUIRED=NO \
                         > xcodebuild.log 2>&1; then
            echo "============================================="
            echo "           XCODEBUILD BUILD FAILED           "
            echo "============================================="
            python3 -c '
            import sys
            try:
                with open("xcodebuild.log", "r", encoding="utf-8", errors="ignore") as f:
                    lines = f.readlines()
            except Exception as e:
                print("Failed to read log:", e)
                sys.exit(1)

            errors = []
            for idx, line in enumerate(lines):
                if "error:" in line.lower() and "note:" not in line.lower():
                    start = max(0, idx - 4)
                    end = min(len(lines), idx + 5)
                    errors.append((idx + 1, lines[start:end]))

            if errors:
                print(f"=== Found {len(errors)} error(s) in log ===")
                for line_num, context in errors[:15]:
                    print(f"\n--- Error near line {line_num} ---")
                    print("".join(context))
            else:
                print("No explicit \"error:\" found in log. Printing last 100 lines:")
                print("".join(lines[-100:]))
            '
            exit 1
          fi

      - name: Upload Xcodebuild Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/ChessTimeIOS.app Payload/
          zip -qq -r -9 ChessTimeIOS.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ChessTimeIOS.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
