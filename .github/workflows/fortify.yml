name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (without install)
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile to disable code signing
        run: |
          ruby -e '
          podfile = File.read("ios/Podfile")
          addition = "
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"
                end
              end
              installer.aggregate_targets.each do |target|
                target.user_project.targets.each do |proj_target|
                  proj_target.build_configurations.each do |config|
                    config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"
                    config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"
                    config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"
                  end
                end
                target.user_project.save
              end
          "
          if podfile.include?("post_install do |installer|")
            podfile = podfile.sub("post_install do |installer|", addition)
            File.write("ios/Podfile", podfile)
            puts "Successfully patched Podfile"
          else
            puts "Could not find post_install in Podfile"
          end
          '

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Unsigned)
        run: |
          xcodebuild -workspace ios/ChessTimeIOS.xcworkspace \
                     -scheme ChessTimeIOS \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_REQUIRED=NO \
                     > xcodebuild.log 2>&1
          
          if [ $? -ne 0 ]; then
            echo "============================================="
            echo "           XCODEBUILD BUILD FAILED           "
            echo "============================================="
            echo "--- Extracting compile errors from log ---"
            grep -i -C 3 "error:" xcodebuild.log || true
            echo "--- Last 200 lines of build log ---"
            tail -n 200 xcodebuild.log
            exit 1
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/ChessTimeIOS.app Payload/
          zip -qq -r -9 ChessTimeIOS.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ChessTimeIOS.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"

